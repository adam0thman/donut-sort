<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7ad6c0">
<title>Yummy Match</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='%23ff9f1c'/><circle cx='50' cy='50' r='20' fill='%23fff'/></svg>">
<style>
:root{--tx:#2e3a3a;--fs:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--br-xl:22px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:var(--fs);color:var(--tx);min-height:100vh;
  background:linear-gradient(160deg,#bdf3e6 0%,#8fd3ff 50%,#c4b5ff 100%) fixed;
  display:flex;justify-content:center;
  padding:max(14px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom));}
#wrap{width:100%;max-width:560px;}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-family:inherit;font-size:18px;font-weight:800;color:#fff;background:#16b3a0;border:none;border-radius:999px;padding:13px 22px;cursor:pointer;box-shadow:0 5px 0 #0d8576;text-decoration:none;transition:transform .08s,box-shadow .08s;touch-action:manipulation;}
.back-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #0d8576;}
.title{font-size:30px;font-weight:800;color:#fff;text-shadow:0 3px 0 #f08a00,0 4px 6px rgba(0,0,0,.18);margin-left:4px;}
.headrow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.pill{font-size:15px;font-weight:800;color:#0d8576;background:#fff;padding:6px 16px;border-radius:999px;box-shadow:0 2px 0 rgba(0,0,0,.08);}
.btn{font-family:inherit;font-size:15px;font-weight:800;color:#2e3a3a;background:#fff;border:none;border-radius:999px;padding:10px 16px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.12);transition:transform .08s,box-shadow .08s;touch-action:manipulation;}
.btn:active{transform:translateY(3px);box-shadow:0 0 0 rgba(0,0,0,.12);}
.ic{width:1.1em;height:1.1em;vertical-align:-.18em;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
.panel{position:relative;}
#board{display:grid;gap:12px;}
.card{position:relative;aspect-ratio:1;border:none;background:transparent;padding:0;cursor:pointer;perspective:700px;touch-action:manipulation;}
.card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.34,1.4,.5,1);}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.face{position:absolute;inset:0;border-radius:18px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 4px 0 rgba(0,0,0,.14);}
.back{background:#7b4dff;}
.front{background:#fff;transform:rotateY(180deg);}
.face svg{width:74%;height:74%;}
.card.matched .front{background:#eafff4;box-shadow:0 0 0 4px #34d399 inset,0 4px 0 rgba(0,0,0,.14);animation:wiggle .5s ease;}
@keyframes wiggle{0%,100%{transform:rotateY(180deg) rotate(0)}25%{transform:rotateY(180deg) rotate(-6deg)}75%{transform:rotateY(180deg) rotate(6deg)}}
.confetti{position:absolute;top:-40px;animation:fall linear forwards;pointer-events:none;}
@keyframes fall{to{transform:translateY(640px) rotate(540deg);opacity:.9;}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}
@media (max-width:430px){.title{font-size:25px;}#board{gap:9px;}}
</style>
</head>
<body>
<div id="wrap">
<h1 class="sr-only">Yummy Match memory game</h1>
<div class="topbar">
  <a class="back-btn" href="index.html"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6l6 6"/></svg> Back</a>
  <span class="title">🍓 Yummy Match</span>
</div>

<div class="headrow">
  <span class="pill" id="mm-prog"></span>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="btn" id="mm-sound" aria-label="Toggle sound"></button>
    <button class="btn" id="mm-restart"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg> New</button>
  </div>
</div>

<p style="font-size:15px;font-weight:700;color:#2b4a4a;margin:0 0 12px;">Tap two cards to find the matching yummy treats! 🎈</p>

<div class="panel">
  <div id="board"></div>
  <div id="mm-overlay" style="display:none;position:absolute;inset:0;background:rgba(20,40,50,.5);backdrop-filter:blur(2px);align-items:center;justify-content:center;flex-direction:column;z-index:5;border-radius:var(--br-xl);">
    <div style="background:#fff;border-radius:var(--br-xl);padding:26px 30px;text-align:center;max-width:330px;animation:pop .4s ease;box-shadow:0 10px 0 rgba(0,0,0,.12);">
      <div id="mm-win-art" style="font-size:0;margin-bottom:6px;"></div>
      <div style="font-size:26px;font-weight:800;color:#16b3a0;">You did it! 🎉</div>
      <div id="mm-win-sub" style="font-size:15px;color:#5a7070;margin:6px 0 18px;font-weight:700;"></div>
      <button class="btn" id="mm-next" style="background:#ff9f1c;color:#fff;font-size:19px;font-weight:800;padding:14px 28px;box-shadow:0 5px 0 #d27c00;"></button>
    </div>
  </div>
</div>
</div>

<script>
(function(){
  let muted=false,_ac;
  function AC(){if(!_ac){try{_ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(_ac&&_ac.state==='suspended')_ac.resume();return _ac;}
  function tone(f,t0,dur,type,vol){const ac=AC();if(!ac||muted)return;const o=ac.createOscillator(),g=ac.createGain();o.type=type||'sine';o.frequency.value=f;const t=ac.currentTime+t0;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.22,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+dur+0.03);}
  const sFlip=()=>tone(440,0,0.09,'triangle',0.16);
  const sMatch=()=>{tone(660,0,0.13,'sine',0.25);tone(880,0.1,0.18,'sine',0.22);tone(1320,0.2,0.18,'sine',0.16);};
  const sNope=()=>{tone(300,0,0.12,'sine',0.14);tone(230,0.1,0.14,'sine',0.14);};
  const sWin=()=>[523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f,i*0.13,0.32,'triangle',0.25));

  const FOODS={
    donut:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#f0b46e"/><circle cx="50" cy="50" r="35" fill="#ff7eb6"/><circle cx="50" cy="50" r="14" fill="#fff"/><g fill="#fff"><rect x="34" y="29" width="9" height="3.6" rx="1.8" transform="rotate(25 38 31)"/><rect x="58" y="34" width="9" height="3.6" rx="1.8" transform="rotate(-20 62 35)"/><rect x="30" y="58" width="9" height="3.6" rx="1.8" transform="rotate(-35 34 59)"/><rect x="60" y="60" width="9" height="3.6" rx="1.8" transform="rotate(40 64 61)"/></g></svg>`,
    strawberry:`<svg viewBox="0 0 100 100"><path d="M50 30 C74 30 82 50 50 88 C18 50 26 30 50 30 Z" fill="#ff3b5c"/><g fill="#ffd23f"><circle cx="42" cy="48" r="2.4"/><circle cx="56" cy="48" r="2.4"/><circle cx="50" cy="60" r="2.4"/><circle cx="38" cy="62" r="2.4"/><circle cx="62" cy="62" r="2.4"/><circle cx="50" cy="44" r="2.4"/></g><path d="M36 31 Q50 18 64 31 Q50 37 36 31 Z" fill="#3fbf67"/><rect x="47.5" y="20" width="5" height="12" rx="2.5" fill="#3fbf67"/></svg>`,
    banana:`<svg viewBox="0 0 100 100"><path d="M22 44 Q34 84 78 72 Q86 70 84 64 Q70 72 56 68 Q34 60 32 40 Q32 34 26 36 Q20 38 22 44 Z" fill="#ffd23f" stroke="#e3aa1e" stroke-width="3" stroke-linejoin="round"/><path d="M78 72 Q84 71 84 64" stroke="#8a5a2b" stroke-width="5" fill="none" stroke-linecap="round"/></svg>`,
    apple:`<svg viewBox="0 0 100 100"><rect x="47" y="20" width="5" height="14" rx="2.5" fill="#7a4a2b"/><ellipse cx="62" cy="26" rx="11" ry="6" fill="#3fbf67" transform="rotate(-22 62 26)"/><path d="M50 32 C30 32 22 50 28 68 C33 84 45 86 50 80 C55 86 67 84 72 68 C78 50 70 32 50 32 Z" fill="#ff4757"/><ellipse cx="40" cy="50" rx="7" ry="10" fill="#fff" opacity="0.25"/></svg>`,
    orange:`<svg viewBox="0 0 100 100"><circle cx="50" cy="54" r="34" fill="#ff9f1c"/><g stroke="#e07b00" stroke-width="2" opacity="0.55"><line x1="50" y1="54" x2="50" y2="22"/><line x1="50" y1="54" x2="80" y2="42"/><line x1="50" y1="54" x2="80" y2="66"/><line x1="50" y1="54" x2="60" y2="85"/><line x1="50" y1="54" x2="36" y2="84"/><line x1="50" y1="54" x2="22" y2="62"/></g><ellipse cx="56" cy="24" rx="10" ry="5" fill="#3fbf67" transform="rotate(15 56 24)"/><ellipse cx="40" cy="42" rx="7" ry="9" fill="#fff" opacity="0.25"/></svg>`,
    grapes:`<svg viewBox="0 0 100 100"><rect x="48" y="16" width="4" height="12" fill="#7a4a2b"/><path d="M40 22 Q52 14 60 24 Q52 28 40 22Z" fill="#3fbf67"/><g fill="#a86cd6"><circle cx="42" cy="40" r="9"/><circle cx="58" cy="40" r="9"/><circle cx="50" cy="50" r="9"/><circle cx="36" cy="54" r="9"/><circle cx="64" cy="54" r="9"/><circle cx="50" cy="64" r="9"/><circle cx="43" cy="74" r="9"/><circle cx="57" cy="74" r="9"/></g></svg>`,
    watermelon:`<svg viewBox="0 0 100 100"><path d="M12 42 A38 30 0 0 0 88 42 Z" fill="#3fbf67"/><path d="M16 42 A34 26 0 0 0 84 42 Z" fill="#eaffea"/><path d="M20 42 A30 23 0 0 0 80 42 Z" fill="#ff4757"/><g fill="#2a2a2a"><ellipse cx="40" cy="50" rx="2.2" ry="3.4"/><ellipse cx="54" cy="54" rx="2.2" ry="3.4"/><ellipse cx="64" cy="48" rx="2.2" ry="3.4"/><ellipse cx="48" cy="60" rx="2.2" ry="3.4"/></g></svg>`,
    cherry:`<svg viewBox="0 0 100 100"><path d="M40 50 Q58 22 74 24 M62 52 Q64 30 74 24" stroke="#3fbf67" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="36" cy="66" r="16" fill="#ff3b5c"/><circle cx="64" cy="68" r="16" fill="#d62246"/><ellipse cx="31" cy="61" rx="4" ry="6" fill="#fff" opacity="0.3"/></svg>`,
    lemon:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="36" ry="26" fill="#ffe14d" stroke="#e7c020" stroke-width="3"/><circle cx="85" cy="52" r="4" fill="#e7c020"/><circle cx="15" cy="52" r="4" fill="#e7c020"/><ellipse cx="40" cy="44" rx="9" ry="6" fill="#fff" opacity="0.3"/></svg>`,
    icecream:`<svg viewBox="0 0 100 100"><path d="M36 52 L64 52 L50 92 Z" fill="#e8b06a"/><g stroke="#c98a4f" stroke-width="2"><line x1="42" y1="58" x2="50" y2="66"/><line x1="58" y1="58" x2="50" y2="66"/></g><circle cx="40" cy="44" r="15" fill="#ff7eb6"/><circle cx="60" cy="44" r="15" fill="#7ad6c0"/><circle cx="50" cy="34" r="15" fill="#ffd23f"/></svg>`,
    cupcake:`<svg viewBox="0 0 100 100"><path d="M32 56 L68 56 L62 88 L38 88 Z" fill="#ffb3c8"/><g stroke="#ff7eb6" stroke-width="2"><line x1="44" y1="58" x2="41" y2="86"/><line x1="50" y1="58" x2="50" y2="86"/><line x1="56" y1="58" x2="59" y2="86"/></g><path d="M28 58 Q28 30 50 30 Q72 30 72 58 Z" fill="#a86cd6"/><circle cx="50" cy="26" r="6" fill="#ff3b5c"/></svg>`,
    lollipop:`<svg viewBox="0 0 100 100"><rect x="47" y="50" width="6" height="40" rx="3" fill="#fff" stroke="#d9d9d9" stroke-width="2"/><circle cx="50" cy="40" r="28" fill="#ff7eb6"/><path d="M50 18 a22 22 0 0 1 0 44 a16 16 0 0 1 0 -32 a10 10 0 0 0 0 20" fill="none" stroke="#fff" stroke-width="4"/></svg>`
  };
  const KEYS=Object.keys(FOODS);
  const STAR=`<svg viewBox="0 0 100 100"><path d="M50 22 L59 42 L81 44 L64 59 L70 81 L50 69 L30 81 L36 59 L19 44 L41 42 Z" fill="#fff" opacity="0.92"/><circle cx="26" cy="26" r="4" fill="#fff" opacity="0.6"/><circle cx="76" cy="74" r="4" fill="#fff" opacity="0.6"/></svg>`;

  const LEVELS=[{pairs:3,cols:3},{pairs:4,cols:4},{pairs:6,cols:4},{pairs:8,cols:4}];
  let lvl=0,first=null,lock=false,matched=0,total=0;
  const $=id=>document.getElementById(id);

  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  function build(){
    const def=LEVELS[lvl];first=null;lock=false;matched=0;total=def.pairs;
    const pick=shuffle(KEYS.slice()).slice(0,def.pairs);
    const deck=shuffle(pick.concat(pick));
    const board=$('board');
    board.style.gridTemplateColumns=`repeat(${def.cols},1fr)`;
    board.innerHTML=deck.map((food,i)=>`<button class="card" data-i="${i}" data-food="${food}" aria-label="card"><div class="card-inner"><div class="face back">${STAR}</div><div class="face front">${FOODS[food]}</div></div></button>`).join('');
    Array.from(board.querySelectorAll('.card')).forEach(c=>c.addEventListener('click',()=>flip(c)));
    $('mm-overlay').style.display='none';
    $('mm-prog').textContent=`Found 0 / ${def.pairs}`;
  }

  function flip(card){
    AC();
    if(lock||card.classList.contains('flipped')||card.classList.contains('matched'))return;
    card.classList.add('flipped');sFlip();
    if(!first){first=card;return;}
    lock=true;
    const a=first,b=card;
    if(a.dataset.food===b.dataset.food){
      setTimeout(()=>{a.classList.add('matched');b.classList.add('matched');sMatch();matched++;first=null;lock=false;$('mm-prog').textContent=`Found ${matched} / ${total}`;if(matched===total)setTimeout(win,520);},260);
    }else{
      sNope();
      setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');first=null;lock=false;},850);
    }
  }

  function win(){
    sWin();
    $('mm-win-sub').textContent='You found all the treats!';
    $('mm-win-art').innerHTML='<div style="width:64px;height:64px;display:inline-block">'+FOODS[KEYS[0]]+'</div>';
    const last=lvl===LEVELS.length-1;
    $('mm-next').textContent=last?'Play again 🏆':'Next ➜';
    const o=$('mm-overlay');o.style.display='flex';confetti(o);
  }
  function confetti(o){o.querySelectorAll('.confetti').forEach(e=>e.remove());for(let k=0;k<30;k++){const d=document.createElement('div');d.className='confetti';d.innerHTML='<div style="width:34px;height:34px">'+FOODS[KEYS[Math.floor(Math.random()*KEYS.length)]]+'</div>';d.style.left=Math.round(Math.random()*100)+'%';d.style.transform='scale('+(0.5+Math.random()*0.5).toFixed(2)+')';d.style.animationDuration=(1.6+Math.random()*1.6).toFixed(2)+'s';d.style.animationDelay=(Math.random()*0.6).toFixed(2)+'s';o.appendChild(d);setTimeout(()=>d.remove(),3800);}}

  function updSound(){$('mm-sound').textContent=muted?'🔇':'🔊';}
  $('mm-sound').addEventListener('click',()=>{muted=!muted;updSound();if(!muted){AC();sFlip();}});
  $('mm-restart').addEventListener('click',build);
  $('mm-next').addEventListener('click',()=>{lvl=(lvl===LEVELS.length-1)?0:lvl+1;build();});
  updSound();build();
})();
</script>
</body>
</html>
