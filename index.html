<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffd23f">
<meta name="description" content="Fun games for little kids — Donut Sort and Yummy Match.">
<title>Fun Games!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='%23ff6fa3'/><circle cx='50' cy='50' r='15' fill='%23fff'/></svg>">
<style>
:root{--fs:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:var(--fs);min-height:100vh;color:#3a2a1e;overflow-x:hidden;
  background:linear-gradient(160deg,#ffe680 0%,#ff9ec9 50%,#9d8cff 100%) fixed;
  display:flex;justify-content:center;
  padding:max(20px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));}
#wrap{width:100%;max-width:760px;position:relative;z-index:1;}
.hero{text-align:center;margin:6px 0 26px;}
.hello{display:inline-block;font-size:clamp(36px,9vw,64px);font-weight:800;letter-spacing:.5px;color:#fff;
  text-shadow:0 4px 0 #ff5fa2,0 7px 0 #d23c80,0 9px 10px rgba(0,0,0,.18);animation:bob 2.6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:rotate(-2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-6px)}}
.sub{font-size:clamp(16px,4vw,22px);font-weight:800;color:#fff;margin-top:10px;text-shadow:0 2px 0 rgba(0,0,0,.15);}
.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:22px;}
.game{display:block;text-decoration:none;color:inherit;border-radius:28px;padding:16px;cursor:pointer;
  box-shadow:0 9px 0 rgba(0,0,0,.18);transition:transform .12s,box-shadow .12s;border:5px solid #fff;}
.game:active{transform:translateY(6px);box-shadow:0 3px 0 rgba(0,0,0,.18);}
.game:nth-child(odd){transform:rotate(-1.5deg);}
.game:nth-child(even){transform:rotate(1.5deg);}
.game:nth-child(odd):active,.game:nth-child(even):active{transform:translateY(6px) rotate(0);}
.g-donut{background:#ff8fc0;}
.g-match{background:#5fd6bf;}
.thumb{background:rgba(255,255,255,.55);border-radius:18px;padding:10px;}
.thumb svg{display:block;width:100%;height:auto;}
.glabel{margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.gname{font-size:26px;font-weight:800;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.18);line-height:1.1;}
.gtag{font-size:14px;font-weight:800;color:rgba(255,255,255,.92);display:block;margin-top:2px;text-shadow:none;}
.play{flex:0 0 auto;font-size:17px;font-weight:800;color:#3a2a1e;background:#fff;border-radius:999px;padding:10px 18px;box-shadow:0 4px 0 rgba(0,0,0,.18);white-space:nowrap;}
.age{display:inline-block;font-size:12px;font-weight:800;color:#fff;background:rgba(0,0,0,.22);border-radius:999px;padding:3px 10px;margin-top:8px;}
.foot{text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.9);margin-top:26px;text-shadow:0 1px 0 rgba(0,0,0,.12);}
.bg-deco{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.floaty{position:absolute;width:60px;height:60px;opacity:.5;animation:float 9s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-26px) rotate(18deg)}}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}
</style>
</head>
<body>
<div class="bg-deco" id="deco"></div>
<div id="wrap">
  <header class="hero">
    <h1 class="hello">🎈 Fun Games!</h1>
    <p class="sub">Tap a game to play 👇</p>
  </header>

  <main class="games">
    <a class="game g-donut" href="donut-sort.html" aria-label="Play Donut Sort">
      <div class="thumb">
        <svg viewBox="0 0 240 150" aria-hidden="true">
          <g stroke="none">
            <rect x="44" y="118" width="48" height="11" rx="5" fill="#cf9a5d"/>
            <rect x="113" y="118" width="48" height="11" rx="5" fill="#cf9a5d"/>
            <rect x="182" y="118" width="48" height="11" rx="5" fill="#cf9a5d"/>
            <rect x="64" y="44" width="8" height="78" rx="4" fill="#d7a86b"/>
            <rect x="133" y="44" width="8" height="78" rx="4" fill="#d7a86b"/>
            <rect x="202" y="44" width="8" height="78" rx="4" fill="#d7a86b"/>
          </g>
          <g>
            <ellipse cx="68" cy="116" rx="30" ry="10" fill="#ff6fa3"/><ellipse cx="68" cy="116" rx="8" ry="3" fill="#a8763c"/>
            <ellipse cx="68" cy="100" rx="30" ry="10" fill="#5fb84f"/><ellipse cx="68" cy="100" rx="8" ry="3" fill="#a8763c"/>
            <ellipse cx="68" cy="84" rx="30" ry="10" fill="#ffc73d"/><ellipse cx="68" cy="84" rx="8" ry="3" fill="#a8763c"/>
            <ellipse cx="137" cy="116" rx="30" ry="10" fill="#4f8be0"/><ellipse cx="137" cy="116" rx="8" ry="3" fill="#a8763c"/>
            <ellipse cx="137" cy="100" rx="30" ry="10" fill="#ff6fa3"/><ellipse cx="137" cy="100" rx="8" ry="3" fill="#a8763c"/>
            <ellipse cx="206" cy="116" rx="30" ry="10" fill="#a86cd6"/><ellipse cx="206" cy="116" rx="8" ry="3" fill="#a8763c"/>
            <ellipse cx="206" cy="100" rx="30" ry="10" fill="#ff8a3c"/><ellipse cx="206" cy="100" rx="8" ry="3" fill="#a8763c"/>
            <ellipse cx="206" cy="84" rx="30" ry="10" fill="#5fb84f"/><ellipse cx="206" cy="84" rx="8" ry="3" fill="#a8763c"/>
          </g>
        </svg>
      </div>
      <div class="glabel">
        <span class="gname">Donut Sort<span class="gtag">Stack the flavors!</span><span class="age">Ages 5–7</span></span>
        <span class="play">Play ▶</span>
      </div>
    </a>

    <a class="game g-match" href="match.html" aria-label="Play Yummy Match">
      <div class="thumb">
        <svg viewBox="0 0 240 150" aria-hidden="true">
          <g>
            <rect x="24" y="20" width="44" height="44" rx="10" fill="#7b4dff"/>
            <path d="M46 28 L50 38 L61 39 L52 46 L55 57 L46 51 L37 57 L40 46 L31 39 L42 38 Z" fill="#fff"/>
            <rect x="80" y="20" width="44" height="44" rx="10" fill="#fff"/>
            <g transform="translate(80,20) scale(0.44)"><path d="M50 32 C30 32 22 50 28 68 C33 84 45 86 50 80 C55 86 67 84 72 68 C78 50 70 32 50 32 Z" fill="#ff4757"/><ellipse cx="62" cy="26" rx="11" ry="6" fill="#3fbf67"/></g>
            <rect x="136" y="20" width="44" height="44" rx="10" fill="#fff"/>
            <g transform="translate(136,20) scale(0.44)"><path d="M22 44 Q34 84 78 72 Q86 70 84 64 Q70 72 56 68 Q34 60 32 40 Q32 34 26 36 Q20 38 22 44 Z" fill="#ffd23f" stroke="#e3aa1e" stroke-width="3"/></g>
            <rect x="192" y="20" width="44" height="44" rx="10" fill="#7b4dff"/>
            <path d="M214 28 L218 38 L229 39 L220 46 L223 57 L214 51 L205 57 L208 46 L199 39 L210 38 Z" fill="#fff"/>
            <rect x="52" y="84" width="44" height="44" rx="10" fill="#fff"/>
            <g transform="translate(52,84) scale(0.44)"><g fill="#a86cd6"><circle cx="42" cy="40" r="9"/><circle cx="58" cy="40" r="9"/><circle cx="50" cy="50" r="9"/><circle cx="36" cy="54" r="9"/><circle cx="64" cy="54" r="9"/><circle cx="50" cy="64" r="9"/></g></g>
            <rect x="108" y="84" width="44" height="44" rx="10" fill="#7b4dff"/>
            <path d="M130 92 L134 102 L145 103 L136 110 L139 121 L130 115 L121 121 L124 110 L115 103 L126 102 Z" fill="#fff"/>
            <rect x="164" y="84" width="44" height="44" rx="10" fill="#fff"/>
            <g transform="translate(164,84) scale(0.44)"><circle cx="50" cy="54" r="34" fill="#ff9f1c"/><ellipse cx="56" cy="24" rx="10" ry="5" fill="#3fbf67"/></g>
          </g>
        </svg>
      </div>
      <div class="glabel">
        <span class="gname">Yummy Match<span class="gtag">Find the pairs!</span><span class="age">Ages 3–5</span></span>
        <span class="play">Play ▶</span>
      </div>
    </a>
  </main>

  <p class="foot">Made with 🍩 and ❤️ · more games coming soon</p>
</div>

<script>
(function(){
  const treats=['🍩','🍓','🍌','🍎','🍊','🍇','🍉','🍒','🍋','🧁','🍭','🍦'];
  const deco=document.getElementById('deco');
  for(let i=0;i<8;i++){
    const s=document.createElement('div');s.className='floaty';
    s.textContent=treats[Math.floor(Math.random()*treats.length)];
    s.style.fontSize=(34+Math.random()*30)+'px';
    s.style.left=(Math.random()*92)+'%';
    s.style.top=(Math.random()*88)+'%';
    s.style.animationDelay=(Math.random()*5).toFixed(1)+'s';
    s.style.animationDuration=(7+Math.random()*5).toFixed(1)+'s';
    deco.appendChild(s);
  }
})();
</script>
</body>
</html>
